<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jardin</title>
  <link rel="icon" type="image/x-icon" href="/public/house.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }


    #scroll-container { height: 600vh; position: relative; }

    #canvas-wrapper {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 1;
    }

    canvas { display: block; width: 100% !important; height: 100% !important; }

    #progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      background: var(--ochre);
      z-index: 20;
      width: 0%;
    }

    #hint {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 1;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }

    #hint.hidden { opacity: 0; }

    #hint span {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.25);
      letter-spacing: 0.05em;
    }

    .scroll-arrow {
      width: 22px; height: 22px;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      animation: bounce 1.4s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50% { transform: rotate(45deg) translateY(7px); }
    }

    #caption {
      position: fixed;
      bottom: 2.5rem;
      right: 2.5rem;
      z-index: 10;
      text-align: right;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.6s ease, transform 0.6s ease;
      pointer-events: none;
    }

    #caption.visible { opacity: 1; transform: translateY(0); }

    #caption h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      line-height: 1.2;
    }

    #caption p {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.85);
      margin-top: 0.2rem;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="progress-bar"></div>
  <div id="scroll-container">
    <div id="canvas-wrapper">
      <canvas id="scene"></canvas>
    </div>
  </div>
  <div id="hint">
    <span>Faites défiler pour explorer</span>
    <div class="scroll-arrow"></div>
  </div>
  <div id="caption">
    <h2 id="caption-title"></h2>
    <p id="caption-sub"></p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
